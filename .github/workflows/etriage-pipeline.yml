name: eTriage Generated Pipeline
'on':
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
env: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up runtime
      uses: actions/setup-python@v5
    - name: Build project
      run: echo 'build step complete'
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: echo 'no test commands'
  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Run linter
      run: echo 'no lint commands'
  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Security scan
      run: echo 'no security scan'
  deploy:
    runs-on: ubuntu-latest
    needs:
    - test
    - lint
    - security_scan
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0
    - name: Bootstrap state backend
      run: chmod +x terraform/bootstrap.sh && terraform/bootstrap.sh ${{ github.event.repository.name
        }}
    - name: Terraform Init
      run: terraform init -backend-config="bucket=${{ github.event.repository.name
        }}-tfstate" -backend-config="key=${{ github.ref_name }}/terraform.tfstate"
        -backend-config="region=${{ secrets.AWS_REGION }}"
      working-directory: ./terraform
    - name: Terraform Plan
      run: terraform plan -out=tfplan
      working-directory: ./terraform
    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan
      working-directory: ./terraform
      if: github.ref == 'refs/heads/main'
    - name: Run app deploy commands
      if: success()
      run: echo 'Terraform apply complete'
    - name: Notify eTriage on failure
      if: failure()
      run: 'curl -X POST ${{ secrets.ETRIAGE_WEBHOOK_URL }}/api/v1/deploy/workflow-status
        -H ''Content-Type: application/json'' -d ''{"pipeline_id":"${{ github.run_id
        }}","job_id":"deploy","error_type":"deploy_failure","logs":"Deploy failed
        on ${{ github.sha }}","source":"github_actions"}'''
  monitor:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
    - name: Report status to eTriage
      run: 'curl -X POST ${{ secrets.ETRIAGE_WEBHOOK_URL }}/api/v1/deploy/workflow-status
        -H ''Content-Type: application/json'' -d ''{"pipeline_id":"${{ github.run_id
        }}","job_id":"monitor","error_type":"pipeline_complete","logs":"Pipeline finished:
        ${{ job.status }}","source":"github_actions"}'''
